; Charger Monitor - ESP32-C3 firmware (ESP-IDF)
; See docs/PROTOCOL.md for the charger BLE protocol.

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf

monitor_speed = 115200
; ESP32-C3 talks over its native USB Serial/JTAG; decode panic backtraces
monitor_filters = esp32_exception_decoder

; OTA-capable A/B partition layout
board_build.partitions = partitions.csv

; Regenerate src/build_info.h with a fresh build stamp before each build (SCons
; keys recompilation off file content, so a plain mtime touch does nothing).
extra_scripts = pre:tools/stamp_touch.py
