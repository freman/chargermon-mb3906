<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Charge status UI mockup: charge-stage stepper and teardrop capacity gauge">
  <style>
    :root{
      --surface:#fcfcfb; --ink:#0b0b0b; --sub:#52514e; --muted:#898781;
      --hollow:#e1e0d9; --blue:#2a78d6; --blue-hi:#6da7ec; --blue-lo:#1c5cab;
      --ring:rgba(11,11,11,0.10);
    }
    @media (prefers-color-scheme: dark){
      :root{
        --surface:#1a1a19; --ink:#ffffff; --sub:#c3c2b7; --muted:#898781;
        --hollow:#2c2c2a; --blue:#3987e5; --blue-hi:#5598e7; --blue-lo:#184f95;
        --ring:rgba(255,255,255,0.10);
      }
    }
    .bg{fill:var(--surface)}
    .ink{fill:var(--ink)} .sub{fill:var(--sub)} .muted{fill:var(--muted)}
    .cap{fill:var(--muted); font-size:12px; letter-spacing:.14em; text-transform:uppercase}
    .done{fill:var(--blue)} .future-stroke{stroke:var(--hollow)} .future-fill{fill:var(--surface)}
    .conn-done{stroke:var(--blue)} .conn-future{stroke:var(--hollow)}
    .tile{fill:var(--surface); stroke:var(--ring)}
  </style>

  <rect class="bg" x="0" y="0" width="820" height="440" rx="18"/>

  <text class="cap" x="40" y="46">Charger Monitor · charge status (web UI mockup)</text>

  <!-- ============ CHARGE-STAGE STEPPER  (0x24 step) ============ -->
  <text class="sub" x="40" y="86" font-size="13" font-weight="600">Charge stage</text>

  <!-- 8-step strategy (0x24): Check,Recover,Soft,Bulk,Absorb,Maint1,Maint2,Trickle -->
  <!-- connectors -->
  <g stroke-width="3.5" fill="none" stroke-linecap="round">
    <line class="conn-done"   x1="86"  y1="150" x2="151" y2="150"/>
    <line class="conn-done"   x1="183" y1="150" x2="248" y2="150"/>
    <line class="conn-done"   x1="280" y1="150" x2="345" y2="150"/>
    <line class="conn-future" x1="377" y1="150" x2="442" y2="150"/>
    <line class="conn-future" x1="474" y1="150" x2="539" y2="150"/>
    <line class="conn-future" x1="571" y1="150" x2="636" y2="150"/>
    <line class="conn-future" x1="668" y1="150" x2="733" y2="150"/>
  </g>

  <!-- done: Check, Recover, Soft -->
  <circle class="done" cx="70"  cy="150" r="13"/>
  <circle class="done" cx="167" cy="150" r="13"/>
  <circle class="done" cx="264" cy="150" r="13"/>

  <!-- active: Bulk -->
  <circle cx="361" cy="150" r="20" fill="none" stroke="var(--blue)" stroke-width="2" opacity="0.35"/>
  <circle class="done" cx="361" cy="150" r="13"/>
  <circle cx="361" cy="150" r="5" fill="var(--surface)"/>

  <!-- future: Absorb, Maint 1, Maint 2, Trickle -->
  <circle class="future-fill future-stroke" cx="458" cy="150" r="13" stroke-width="2"/>
  <circle class="future-fill future-stroke" cx="555" cy="150" r="13" stroke-width="2"/>
  <circle class="future-fill future-stroke" cx="652" cy="150" r="13" stroke-width="2"/>
  <circle class="future-fill future-stroke" cx="749" cy="150" r="13" stroke-width="2"/>

  <!-- labels -->
  <g font-size="10.5" text-anchor="middle">
    <text class="sub"   x="70"  y="184">Check</text>
    <text class="sub"   x="167" y="184">Recover</text>
    <text class="sub"   x="264" y="184">Soft</text>
    <text class="ink"   x="361" y="184" font-weight="700">Bulk</text>
    <text class="muted" x="458" y="184">Absorb</text>
    <text class="muted" x="555" y="184">Maint 1</text>
    <text class="muted" x="652" y="184">Maint 2</text>
    <text class="muted" x="749" y="184">Trickle</text>
  </g>

  <!-- ============ TEARDROP CAPACITY GAUGE  (0x62 %) ============ -->
  <defs>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--blue-hi)"/>
      <stop offset="1" stop-color="var(--blue-lo)"/>
    </linearGradient>
    <clipPath id="drop">
      <path d="M150 250 C150 250 90 316 90 346 C90 376 118 393 150 393 C182 393 210 376 210 346 C210 316 150 250 150 250 Z"/>
    </clipPath>
  </defs>

  <text class="sub" x="150" y="238" font-size="13" font-weight="600" text-anchor="middle">Capacity</text>

  <!-- empty vessel -->
  <path d="M150 250 C150 250 90 316 90 346 C90 376 118 393 150 393 C182 393 210 376 210 346 C210 316 150 250 150 250 Z"
        fill="var(--hollow)" opacity="0.45"/>
  <!-- liquid fill: 62% of the 250..393 span -> top at y≈304 -->
  <g clip-path="url(#drop)">
    <rect x="82" y="304" width="136" height="92" fill="url(#liquid)"/>
    <rect x="82" y="304" width="136" height="2.5" fill="var(--blue-hi)" opacity="0.9"/>
  </g>
  <!-- vessel outline -->
  <path d="M150 250 C150 250 90 316 90 346 C90 376 118 393 150 393 C182 393 210 376 210 346 C210 316 150 250 150 250 Z"
        fill="none" stroke="var(--ring)" stroke-width="1.5"/>
  <!-- readout -->
  <text class="ink" x="150" y="352" font-size="34" font-weight="700" text-anchor="middle">62%</text>

  <!-- ============ STAT TILES ============ -->
  <g>
    <rect class="tile" x="300" y="244" width="150" height="66" rx="12" stroke-width="1"/>
    <text class="cap" x="318" y="270" font-size="11">Voltage</text>
    <text class="ink" x="318" y="298" font-size="24" font-weight="700">13.2<tspan class="muted" font-size="13" font-weight="400"> V</tspan></text>

    <rect class="tile" x="466" y="244" width="150" height="66" rx="12" stroke-width="1"/>
    <text class="cap" x="484" y="270" font-size="11">Current</text>
    <text class="ink" x="484" y="298" font-size="24" font-weight="700">4.0<tspan class="muted" font-size="13" font-weight="400"> A</tspan></text>

    <rect class="tile" x="632" y="244" width="150" height="66" rx="12" stroke-width="1"/>
    <text class="cap" x="650" y="270" font-size="11">Program</text>
    <text class="ink" x="650" y="298" font-size="22" font-weight="700">Car <tspan class="muted" font-size="13" font-weight="400">12V</tspan></text>

    <rect class="tile" x="300" y="326" width="316" height="66" rx="12" stroke-width="1"/>
    <text class="cap" x="318" y="352" font-size="11">Charger state</text>
    <text class="ink" x="318" y="380" font-size="20" font-weight="700">Charging<tspan class="sub" font-size="13" font-weight="400">  ·  battery detected</tspan></text>

    <rect class="tile" x="632" y="326" width="150" height="66" rx="12" stroke-width="1"/>
    <text class="cap" x="650" y="352" font-size="11">Enable</text>
    <text class="ink" x="650" y="380" font-size="20" font-weight="700">On</text>
  </g>

  <text class="muted" x="40" y="424" font-size="11">Placeholder palette - swap for brand. Stages = 0x24 · gauge = 0x62 · tiles = 0x60/0x61/0x23/0x21/0x25.</text>
</svg>
